<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="default">
<meta name="apple-mobile-web-app-title" content="혁신소방 점검대장">
<meta name="theme-color" content="#1c3d6e">
<title>혁신소방 점검대장</title>
<style>
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
html,body{height:100%;font-family:-apple-system,BlinkMacSystemFont,'Samsung One','Noto Sans KR','Malgun Gothic',sans-serif;background:#f2f3f7;color:#111;font-size:15px}
#app{display:flex;flex-direction:column;height:100%;max-width:600px;margin:0 auto}
.top-bar{background:#1c3d6e;padding:env(safe-area-inset-top,0px) 0 0;color:#fff;flex-shrink:0}
.top-inner{padding:12px 16px 12px}
.top-title{font-size:17px;font-weight:700;letter-spacing:-0.3px}
.top-sub{font-size:12px;opacity:0.7;margin-top:2px}
.top-date{font-size:11px;opacity:0.5;margin-top:1px}
.search-area{background:#1c3d6e;padding:0 12px 12px;flex-shrink:0}
.search-box{display:flex;align-items:center;background:rgba(255,255,255,0.15);border-radius:12px;padding:0 12px;gap:8px;height:44px}
.search-box input{flex:1;background:none;border:none;color:#fff;font-size:15px;outline:none;font-family:inherit;-webkit-appearance:none}
.search-box input::placeholder{color:rgba(255,255,255,0.55)}
.filter-bar{background:#fff;border-bottom:1px solid #e8e8ec;display:flex;flex-shrink:0}
.ft{flex:1;height:44px;border:none;background:none;font-size:14px;color:#888;font-family:inherit;cursor:pointer;position:relative;-webkit-appearance:none}
.ft.on{color:#1c3d6e;font-weight:700}
.ft.on::after{content:'';position:absolute;bottom:0;left:20%;right:20%;height:2.5px;background:#1c3d6e;border-radius:2px}
.stat-row{display:grid;grid-template-columns:repeat(4,1fr);gap:1px;background:#e8e8ec;border-bottom:1px solid #e0e0e6;flex-shrink:0}
.sc{background:#fff;padding:9px 4px;text-align:center}
.sc-v{font-size:18px;font-weight:700;color:#1c3d6e}
.sc-l{font-size:10px;color:#999;margin-top:1px}
.list-wrap{flex:1;overflow-y:auto;-webkit-overflow-scrolling:touch;padding:8px}
.rh{font-size:12px;color:#aaa;padding:4px 4px 8px;display:flex;justify-content:space-between;align-items:center}
.rh-date{font-size:11px;color:#bbb;background:#f0f0f0;padding:2px 8px;border-radius:10px}
.card{background:#fff;border-radius:14px;margin-bottom:8px;overflow:hidden;box-shadow:0 1px 4px rgba(0,0,0,0.08)}
.card.open{box-shadow:0 2px 12px rgba(28,61,110,0.15)}
.card-head{padding:13px 16px;cursor:pointer;-webkit-user-select:none;user-select:none;-webkit-touch-callout:none}
.head-top{display:flex;align-items:center;gap:7px;flex-wrap:wrap}
.cno{font-size:12px;color:#bbb;min-width:24px;flex-shrink:0}
.cnm{font-size:16px;font-weight:700;color:#111;flex:1;letter-spacing:-0.3px;word-break:keep-all}
.badge{font-size:11px;padding:3px 8px;border-radius:20px;font-weight:600;white-space:nowrap;flex-shrink:0}
.bg{background:#e6f0fb;color:#1460a8}
.by{background:#f3f0ff;color:#5b4acb}
.bt-종합{background:#e6f5e6;color:#2e7d32}
.bt-작동{background:#fff3e0;color:#e65100}
.bd{background:#fde8e8;color:#c62828}
.bok{background:#e6f5e6;color:#2e7d32}
.bhist{background:#f5f5f5;color:#888;font-size:10px}
.head-sub{font-size:12px;color:#999;margin-top:5px;line-height:1.6;word-break:keep-all}
.chevron{font-size:12px;color:#ccc;margin-left:auto;transition:transform 0.2s;flex-shrink:0}
.card.open .chevron{transform:rotate(180deg)}
.detail{border-top:1px solid #f0f0f5;background:#fafafe}
.year-bar{display:flex;overflow-x:auto;-webkit-overflow-scrolling:touch;border-bottom:1px solid #e8ecf4;background:#fff;scrollbar-width:none}
.year-bar::-webkit-scrollbar{display:none}
.ybtn{flex-shrink:0;height:38px;padding:0 18px;border:none;background:none;font-size:13px;color:#999;font-family:inherit;cursor:pointer;position:relative;font-weight:500;-webkit-appearance:none}
.ybtn.on{color:#1c3d6e;font-weight:700}
.ybtn.on::after{content:'';position:absolute;bottom:0;left:10%;right:10%;height:2.5px;background:#1c3d6e;border-radius:2px}
.dtabs{display:flex;overflow-x:auto;-webkit-overflow-scrolling:touch;padding:10px 12px 0;gap:6px;scrollbar-width:none;background:#fafafe}
.dtabs::-webkit-scrollbar{display:none}
.dtab{flex-shrink:0;height:32px;padding:0 14px;border-radius:16px;border:1.5px solid #e0e4ea;background:#f5f5f9;color:#888;font-size:13px;cursor:pointer;font-family:inherit;font-weight:500;-webkit-appearance:none}
.dtab.on{background:#1c3d6e;border-color:#1c3d6e;color:#fff;font-weight:700}
.tab-body{padding:12px 14px 20px;background:#fafafe}
.ig{display:grid;grid-template-columns:1fr 1fr}
.ir{padding:8px 6px;border-bottom:1px solid #f0f0f5}
.ir:nth-child(odd):not(.wide){border-right:1px solid #f0f0f5}
.ir.wide{grid-column:1/-1}
.il{font-size:11px;color:#aaa;margin-bottom:3px}
.iv{font-size:13px;color:#111;line-height:1.5;word-break:break-all}
.fac-big{margin-bottom:14px}
.fac-big-hd{display:flex;align-items:center;gap:8px;padding:9px 12px;border-radius:10px 10px 0 0;background:#1c3d6e;color:#fff}
.fac-big-icon{font-size:16px;flex-shrink:0}
.fac-big-name{font-size:14px;font-weight:700}
.fac-big-body{border:1px solid #dde4f0;border-top:none;border-radius:0 0 10px 10px;overflow:hidden}
.fac-mid{border-bottom:1px solid #eef1f8}
.fac-mid:last-child{border-bottom:none}
.fac-mid-hd{font-size:12px;font-weight:700;color:#1c3d6e;background:#eef2fa;padding:6px 12px;border-bottom:1px solid #dde4f0}
.fac-items{display:flex;flex-direction:column}
.fi{display:flex;justify-content:space-between;align-items:center;padding:9px 14px;background:#fff;border-bottom:1px solid #f4f5f9}
.fi:last-child{border-bottom:none}
.fn{font-size:13px;color:#333;flex:1;line-height:1.4;word-break:keep-all;margin-right:8px}
.fok{font-size:18px;font-weight:700;color:#2e7d32;flex-shrink:0}
.eg{display:grid;grid-template-columns:1fr 1fr;gap:8px}
.ei{background:#f5f6fa;border-radius:10px;padding:14px 12px;text-align:center}
.en{font-size:30px;font-weight:700;color:#1c3d6e}
.el{font-size:11px;color:#888;margin-top:4px;line-height:1.4}
.spec-big{margin-bottom:14px}
.spec-big-hd{background:#1c3d6e;color:#fff;padding:9px 12px;border-radius:10px 10px 0 0;font-size:14px;font-weight:700}
.spec-big-body{border:1px solid #dde4f0;border-top:none;border-radius:0 0 10px 10px;overflow:hidden}
.spec-mid-block{border-bottom:1px solid #eef1f8}
.spec-mid-block:last-child{border-bottom:none}
.spec-mid-hd{font-size:12px;font-weight:700;color:#1c3d6e;background:#eef2fa;padding:6px 12px;border-bottom:1px solid #dde4f0}
.spec-items{display:grid;grid-template-columns:1fr 1fr;background:#fff}
.si{padding:8px 12px;border-bottom:1px solid #f4f5f9}
.si:nth-child(odd):not(.wide){border-right:1px solid #f4f5f9}
.si.wide{grid-column:1/-1}
.si-l{font-size:11px;color:#aaa;margin-bottom:2px}
.si-v{font-size:13px;color:#111;line-height:1.5;word-break:break-all}
.di{background:#fff;border:1px solid #eee;border-radius:10px;padding:12px;margin-bottom:8px}
.di-top{display:flex;align-items:center;gap:7px;margin-bottom:6px;flex-wrap:wrap}
.dc2{font-size:11px;color:#bbb;background:#f5f5f5;padding:2px 7px;border-radius:10px}
.de2{font-size:13px;font-weight:700;color:#555}
.ds{font-size:11px;padding:3px 9px;border-radius:10px;margin-left:auto;white-space:nowrap;font-weight:600;flex-shrink:0}
.s조치완료{background:#e6f5e6;color:#2e7d32}
.s조치요함{background:#fde8e8;color:#c62828}
.dct{font-size:14px;color:#222;line-height:1.6;word-break:keep-all}
.empty{font-size:14px;color:#bbb;padding:24px 0;text-align:center}
.fab{position:fixed;bottom:calc(max(env(safe-area-inset-bottom),16px) + 12px);right:20px;width:50px;height:50px;border-radius:25px;background:#1c3d6e;color:#fff;font-size:22px;border:none;box-shadow:0 4px 14px rgba(28,61,110,0.4);cursor:pointer;display:flex;align-items:center;justify-content:center;z-index:100;-webkit-appearance:none}
.fab:active{transform:scale(0.93)}

/* 보안 잠금 화면 */
#lock-screen{position:fixed;inset:0;background:#1c3d6e;z-index:9999;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:32px}
#lock-screen.hide{display:none}
.lock-logo{font-size:48px;margin-bottom:8px}
.lock-title{font-size:20px;font-weight:700;color:#fff;letter-spacing:-0.3px;margin-bottom:4px}
.lock-sub{font-size:13px;color:rgba(255,255,255,0.6);margin-bottom:32px}
.lock-box{background:rgba(255,255,255,0.1);border-radius:16px;padding:24px;width:100%;max-width:320px}
.lock-label{font-size:12px;color:rgba(255,255,255,0.7);margin-bottom:8px;font-weight:500}
.lock-input{width:100%;height:48px;border-radius:10px;border:1.5px solid rgba(255,255,255,0.25);background:rgba(255,255,255,0.12);color:#fff;font-size:16px;padding:0 14px;font-family:inherit;outline:none;-webkit-appearance:none}
.lock-input:focus{border-color:rgba(255,255,255,0.6)}
.lock-input::placeholder{color:rgba(255,255,255,0.4)}
.lock-btn{width:100%;height:48px;margin-top:16px;border-radius:10px;border:none;background:#fff;color:#1c3d6e;font-size:16px;font-weight:700;font-family:inherit;cursor:pointer;-webkit-appearance:none}
.lock-btn:active{transform:scale(0.97)}
.lock-err{font-size:13px;color:#ff6b6b;text-align:center;margin-top:12px;min-height:20px}
.lock-attempts{font-size:11px;color:rgba(255,255,255,0.4);text-align:center;margin-top:8px}
</style>
</head>
<body>

<!-- 잠금 화면 -->
<div id="lock-screen">
  <div class="lock-logo">🔥</div>
  <div class="lock-title">혁신소방 점검대장</div>
  <div class="lock-sub">접근 권한이 필요합니다</div>
  <div class="lock-box">
    <div class="lock-label">비밀번호</div>
    <input type="password" id="pw-input" class="lock-input" placeholder="비밀번호를 입력하세요"
      onkeydown="if(event.key==='Enter')tryLogin()" autocomplete="off">
    <button class="lock-btn" onclick="tryLogin()">확인</button>
    <div class="lock-err" id="pw-err"></div>
    <div class="lock-attempts" id="pw-attempts"></div>
  </div>
</div>

<div id="app">
  <div class="top-bar">
    <div class="top-inner">
      <div class="top-title">🔥 혁신소방 점검대장</div>
      <div class="top-sub" id="top-sub">로딩 중...</div>
      <div class="top-date">데이터 기준일: 2026년 04월 09일</div>
    </div>
  </div>
  <div class="search-area">
    <div class="search-box">
      <span style="font-size:16px;opacity:0.7">🔍</span>
      <input type="search" id="qi" placeholder="대상물명, 용도, 주소 검색..." oninput="render()" autocomplete="off" autocorrect="off" autocapitalize="off" spellcheck="false">
    </div>
  </div>
  <div class="filter-bar">
    <button class="ft on" onclick="setF('전체')">전체</button>
    <button class="ft" onclick="setF('작동')">작동점검</button>
    <button class="ft" onclick="setF('종합')">종합점검</button>
  </div>
  <div class="stat-row">
    <div class="sc"><div class="sc-v" id="s1">0</div><div class="sc-l">전체</div></div>
    <div class="sc"><div class="sc-v" id="s2">0</div><div class="sc-l">검색결과</div></div>
    <div class="sc"><div class="sc-v" id="s3">0</div><div class="sc-l">불량있음</div></div>
    <div class="sc"><div class="sc-v" id="s4">0</div><div class="sc-l">종합점검</div></div>
  </div>
  <div class="list-wrap">
    <div class="rh"><span id="rh"></span><span class="rh-date">기준: 2026년 04월 09일</span></div>
    <div id="list"></div>
  </div>
</div>
<button class="fab" onclick="document.querySelector('.list-wrap').scrollTo({top:0,behavior:'smooth'})">↑</button>
<script src="data.js"></script>
<script>
const ALL={};
(function(){
  function R(d){
    return{
      no:d.n,year:d.y,type:d.t,usage:d.u,address:d.a,period:d.pd,
      grade:d.g,approval:d.ap,insurance:d.ins,floor_area:d.fa,build_area:d.ba,
      floors:d.fl,height:d.ht,buildings:d.bd,structure:d.st,staircase:d.sc,
      elevator:d.el,parking:d.pk,multi_use:d.mu,fire_plan:d.fp,
      facility:d.fac||{},extinguisher:d.ext||{},spec:d.sp||{},
      defects:(d.def||[]).map(x=>({equip:x.eq,code:x.cd,content:x.ct,status:x.ss})),
      defect_count:d.dc,
      history:(d.hi||[]).map(R)
    };
  }
  for(const [nm,d] of Object.entries(FIRE_RAW)) ALL[nm]=R(d);
})();

let EXP=null,TAB={},RECNO={},FT='전체';
const FAC_TREE=[
  {big:'소화설비',icon:'🧯',mids:[
    {mid:'소화기구 및 자동소화장치',items:['소화기구(소화기,자확,간이)','주거용주방자동소화장치','상업용주방자동소화장치','캐비닛형자동소화장치','가스·분말·고체자동소화장치']},
    {mid:'수계소화설비',items:['옥내소화전설비','스프링클러설비','간이스프링클러설비','화재조기진압용스프링클러설비','물분무소화설비','미분무소화설비','포소화설비']},
    {mid:'가스계·분말 소화설비',items:['이산화탄소소화설비','할론소화설비','할로겐화합물 및 불활성기체 소화설비','분말소화설비','강화액소화설비','고체에어로졸소화설비']},
    {mid:'옥외소화전',items:['옥외소화전설비']},
  ]},
  {big:'경보설비',icon:'🔔',mids:[{mid:'',items:['단독경보형감지기','비상경보설비','자동화재탐지설비 및 시각경보기','비상방송설비','통합감시시설','자동화재속보설비','누전경보기','가스누설경보기']}]},
  {big:'피난구조설비',icon:'🚪',mids:[
    {mid:'피난기구',items:['공기안전매트·피난사다리,(간이)완강기·미끄럼대·구조대','다수인피난장비','승강식피난기,하향식피난구용내림식사다리','인명구조기구']},
    {mid:'유도등 및 유도표지',items:['유도등','유도표지','피난유도선']},
    {mid:'비상조명',items:['비상조명등','휴대용비상조명등']},
  ]},
  {big:'소화용수설비',icon:'💧',mids:[{mid:'',items:['상수도소화용수설비','소화수조 및 저수조']}]},
  {big:'소화활동설비',icon:'🚒',mids:[
    {mid:'제연설비',items:['거실제연설비','부속실 등 제연설비']},
    {mid:'연결설비',items:['연결송수관설비','연결살수설비']},
    {mid:'기타 활동설비',items:['비상콘센트설비','무선통신보조설비','연소방지설비']},
  ]},
  {big:'기타',icon:'🏗️',mids:[{mid:'',items:['방화문, 방화셔터','비상구,피난통로','방염']}]},
  {big:'다중이용업소',icon:'🏪',mids:[{mid:'',items:['소화기또는자동확산소화기','간이스프링클러설비','비상경보설비또는자동화재탐지설비','가스누설경보기','피난기구','피난유도선','유도등·유도표지또는비상조명등','휴대용비상조명','방화문','비상구(비상탈출구)','영업장내부피난통로','영상음향차단장치','누전차단기','창문','피난안내도·피난안내영상물','방염물품']}]},
];
function getRec(nm){const b=ALL[nm],no=RECNO[nm];if(!no||no===b.no)return b;return b.history.find(h=>h.no===no)||b;}
function setF(t){FT=t;document.querySelectorAll('.ft').forEach(b=>{const l=b.textContent.trim();b.classList.toggle('on',t==='전체'?l==='전체':l.startsWith(t));});render();}
function getF(){const q=(document.getElementById('qi').value||'').trim().toLowerCase();return Object.entries(ALL).filter(([nm,d])=>{if(FT!=='전체'&&d.type!==FT)return false;if(!q)return true;return nm.toLowerCase().includes(q)||(d.usage||'').includes(q)||(d.address||'').includes(q);});}
function render(){
  const f=getF();
  document.getElementById('s1').textContent=Object.keys(ALL).length;
  document.getElementById('s2').textContent=f.length;
  document.getElementById('s3').textContent=f.filter(([,d])=>d.defect_count>0).length;
  document.getElementById('s4').textContent=f.filter(([,d])=>d.type==='종합').length;
  document.getElementById('rh').textContent=f.length+'개 대상물';
  document.getElementById('top-sub').textContent=Object.keys(ALL).length+'개 대상물';
  document.getElementById('list').innerHTML=f.map(([nm,d])=>cHTML(nm,d)).join('');
}
function cHTML(nm,d){
  const isO=EXP===nm,rec=getRec(nm);
  const tc=rec.type==='종합'?'bt-종합':'bt-작동';
  const db=rec.defect_count>0?`<span class="badge bd">불량 ${rec.defect_count}건</span>`:`<span class="badge bok">이상없음</span>`;
  const hb=d.history&&d.history.length?`<span class="badge bhist">+${d.history.length}년도</span>`:'';
  return`<div class="card${isO?' open':''}" id="c${d.no}">
<div class="card-head" onclick="tog('${esc(nm)}')">
  <div class="head-top"><span class="cno">${d.no}</span><span class="cnm">${nm}</span><span class="badge by">${rec.year}${d.history&&d.history.some(h=>h.year===rec.year)?` #${rec.no}`:''}</span><span class="badge bg">${rec.grade||''}</span><span class="badge ${tc}">${rec.type}</span>${db}${hb}<span class="chevron">▼</span></div>
  <div class="head-sub">${[rec.usage,rec.floors,rec.address].filter(Boolean).join(' · ')}</div>
</div>${isO?dHTML(nm,d):''}</div>`;
}
function dHTML(nm,d){
  const rec=getRec(nm),selNo=RECNO[nm]||d.no,all=[d,...(d.history||[])];
  const ybar=all.length>1?`<div class="year-bar">${all.map((r,i)=>{
    const isOn=r.no===selNo;
    const lbl=r.year+(all.filter(x=>x.year===r.year).length>1?` #${r.no}`:'')+(i===0?' ★':'');
    return`<button class="ybtn${isOn?' on':''}" onclick="setRec('${esc(nm)}',${r.no});event.stopPropagation()">${lbl}</button>`;
  }).join('')}</div>`:'';
  const t=TAB[nm]||'기본';
  const tabs=[['기본','📋'],['소방시설','🧯'],['소화기구','🪣'],['기기사양','⚙️'],['불량사항','⚠️']];
  const th=tabs.map(([x,ic])=>`<button class="dtab${x===t?' on':''}" onclick="setTab('${esc(nm)}','${x}');event.stopPropagation()">${ic} ${x}</button>`).join('');
  const body=t==='기본'?tBasic(rec):t==='소방시설'?tFac(rec):t==='소화기구'?tExt(rec):t==='기기사양'?tSpec(rec):tDef(rec);
  return`<div class="detail" onclick="event.stopPropagation()">${ybar}<div class="dtabs">${th}</div><div class="tab-body">${body}</div></div>`;
}
function tBasic(r){
  const rows=[['점검연도',r.year,false],['점검종류',r.type,false],['안전관리등급',r.grade,false],['사용승인일',r.approval,true],['연면적',r.floor_area,false],['건축면적',r.build_area,false],['층수',r.floors,false],['높이',r.height,false],['건물동수',r.buildings,false],['건축구조',r.structure,true],['직통계단',r.staircase,false],['승강기',r.elevator,false],['주차장',r.parking,true],['화재보험',r.insurance,true],['점검기간',r.period,true],['소재지',r.address,true],['대상물용도',r.usage,true],['다중이용업소',r.multi_use,false],['소방계획서',r.fire_plan,false]];
  return`<div class="ig">${rows.filter(([,v])=>v).map(([l,v,w])=>`<div class="ir${w?' wide':''}"><div class="il">${l}</div><div class="iv">${v}</div></div>`).join('')}</div>`;
}
function tFac(r){
  const fac=r.facility||{};
  if(!Object.keys(fac).length)return'<p class="empty">소방시설 정보 없음</p>';
  let html='';
  for(const {big,icon,mids} of FAC_TREE){
    if(!mids.some(({items})=>items.some(k=>fac[k])))continue;
    html+=`<div class="fac-big"><div class="fac-big-hd"><span class="fac-big-icon">${icon}</span><span class="fac-big-name">${big}</span></div><div class="fac-big-body">`;
    for(const {mid,items} of mids){
      const vis=items.filter(k=>fac[k]);if(!vis.length)continue;
      html+=`<div class="fac-mid">${mid?`<div class="fac-mid-hd">${mid}</div>`:''}<div class="fac-items">`;
      vis.forEach(k=>{html+=`<div class="fi"><span class="fn">${k}</span><span class="fok">○</span></div>`;});
      html+=`</div></div>`;
    }
    html+=`</div></div>`;
  }
  return html||'<p class="empty">소방시설 정보 없음</p>';
}
function tExt(r){const e=r.extinguisher||{},ks=Object.keys(e);if(!ks.length)return'<p class="empty">소화기구 정보 없음</p>';return`<div class="eg">${ks.map(k=>`<div class="ei"><div class="en">${e[k]}</div><div class="el">${k}</div></div>`).join('')}</div>`;}
function tSpec(r){
  const spec=r.spec;if(!spec||!Object.keys(spec).length)return'<p class="empty">기기사양 정보 없음</p>';
  let html='';
  for(const [big,mids] of Object.entries(spec)){
    const entries=Object.entries(mids);if(!entries.length)continue;
    html+=`<div class="spec-big"><div class="spec-big-hd">⚙️ ${big}</div><div class="spec-big-body">`;
    for(const [mid,items] of entries){
      if(!items||!items.length)continue;
      html+=`<div class="spec-mid-block">`;
      if(mid&&mid!=='_')html+=`<div class="spec-mid-hd">${mid}</div>`;
      html+=`<div class="spec-items">${items.map(it=>`<div class="si${it.vl.length>14?' wide':''}"><div class="si-l">${it.lb}</div><div class="si-v">${it.vl}</div></div>`).join('')}</div></div>`;
    }
    html+=`</div></div>`;
  }
  return html||'<p class="empty">기기사양 정보 없음</p>';
}
function tDef(r){if(!r.defects||!r.defects.length)return'<p class="empty">✅ 불량사항 없음</p>';return r.defects.map(df=>`<div class="di"><div class="di-top"><span class="dc2">${df.code}</span><span class="de2">${df.equip}</span><span class="ds s${df.status}">${df.status}</span></div><div class="dct">${df.content}</div></div>`).join('');}
function tog(nm){EXP=(EXP===nm)?null:nm;if(!RECNO[nm])RECNO[nm]=ALL[nm].no;render();if(EXP){const el=document.getElementById('c'+ALL[nm].no);if(el)setTimeout(()=>el.scrollIntoView({behavior:'smooth',block:'start'}),60);}}
function setTab(nm,t){TAB[nm]=t;render();}
function setRec(nm,no){RECNO[nm]=no;render();}
function esc(s){return s.replace(/\\/g,'\\\\').replace(/'/g,"\\'")}
render();
</script>

<script>

/* ── 보안 잠금 ── */
(function(){
  const URL_KEY = 'fire2026';       // URL 키 (변경 가능)
  const PASSWORD = 'hyukshin!';     // 비밀번호 (변경 가능)
  const MAX_TRY = 5;                // 최대 시도 횟수
  const LOCK_MIN = 10;              // 잠금 시간 (분)
  const SESSION_KEY = 'hs_auth';

  const params = new URLSearchParams(window.location.search);
  const urlKey = params.get('key') || '';

  // STEP 1: URL 키 확인
  if(urlKey !== URL_KEY){
    document.getElementById('lock-screen').innerHTML =
      '<div style="color:rgba(255,255,255,0.5);font-size:14px;text-align:center">접근이 제한된 페이지입니다</div>';
    return;
  }

  // STEP 2: 세션 확인 (이미 로그인된 경우)
  if(sessionStorage.getItem(SESSION_KEY) === 'ok'){
    document.getElementById('lock-screen').classList.add('hide');
    return;
  }

  // STEP 3: 잠금 확인
  const lockUntil = parseInt(localStorage.getItem('hs_lock_until')||'0');
  if(Date.now() < lockUntil){
    const remain = Math.ceil((lockUntil - Date.now()) / 60000);
    document.getElementById('pw-err').textContent = `${remain}분 후 다시 시도해주세요`;
    document.getElementById('pw-input').disabled = true;
    document.querySelector('.lock-btn').disabled = true;
    return;
  }

  window.tryLogin = function(){
    const val = document.getElementById('pw-input').value;
    const tries = parseInt(localStorage.getItem('hs_tries')||'0') + 1;

    if(val === PASSWORD){
      localStorage.removeItem('hs_tries');
      localStorage.removeItem('hs_lock_until');
      sessionStorage.setItem(SESSION_KEY, 'ok');
      document.getElementById('lock-screen').classList.add('hide');
    } else {
      localStorage.setItem('hs_tries', tries);
      const remain = MAX_TRY - tries;
      if(remain <= 0){
        const until = Date.now() + LOCK_MIN * 60000;
        localStorage.setItem('hs_lock_until', until);
        localStorage.setItem('hs_tries', '0');
        document.getElementById('pw-err').textContent = `${LOCK_MIN}분간 잠금됩니다`;
        document.getElementById('pw-input').disabled = true;
        document.querySelector('.lock-btn').disabled = true;
        document.getElementById('pw-attempts').textContent = '';
      } else {
        document.getElementById('pw-err').textContent = '비밀번호가 틀렸습니다';
        document.getElementById('pw-attempts').textContent = `남은 시도: ${remain}회`;
        document.getElementById('pw-input').value = '';
        document.getElementById('pw-input').focus();
      }
    }
  };
})();

</script>
